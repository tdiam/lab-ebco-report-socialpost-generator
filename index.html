<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Social Post Templates</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/@yohns/yoselect@0.1.2/yoSelect.css"
    />
    <style>
      .yo-select {
        --pico-block-spacing-vertical: .5rem;
        font-size: .9rem;
      }
      details.yo-select.dropdown:not([role]) > summary {
        min-height: auto;
      }
      .gallery-grid {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 1rem;
      }
      .template-card {
        text-decoration: none;
        color: inherit;
        display: flex;
        flex-direction: column;
        gap: 0.5rem;
        position: relative;
      }
      .template-card img {
        width: 100%;
        aspect-ratio: 1;
        object-fit: cover;
        border-radius: var(--pico-border-radius);
        display: block;
      }
      .template-card:hover::before {
        content: '';
        position: absolute;
        inset: 0;
        background: rgba(0, 0, 0, 0.6);
      }
      .template-card .overlay {
        position: absolute;
        inset: 9em 2em 0;
        color: black;
        font-size: .85em;
        font-weight: bold;
        text-align: center;
      }
      .template-card .overlay-hover {
        opacity: 0;
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        color: white;
        font-weight: bold;
        text-align: center;
      }
      .template-card .overlay-hover span {
        background: black;
        padding: 0 0.5em;
      }
      .template-card:hover .overlay-hover {
        opacity: 1;
      }
    </style>
  </head>
  <body>
    <main class="container">
      <h1>EBCO Annual Report 2025 &ndash; Social media kit</h1>
      <select id="lang-select" data-yo-search="true" data-yo-close-on-select>
        <option value="sq-AL" data-country="Albania" data-language="Albanian">Albania (Albanian)</option>
        <option value="hy-AM" data-country="Armenia" data-language="Armenian">Armenia (Armenian)</option>
        <option value="de-AT" data-country="Austria" data-language="German">Austria (German)</option>
        <option value="az-AZ" data-country="Azerbaijan" data-language="Azerbaijani">Azerbaijan (Azerbaijani)</option>
        <option value="bs-BA" data-country="Bosnia and Herzegovina" data-language="Bosnian">Bosnia and Herzegovina (Bosnian)</option>
        <option value="de-BE" data-country="Belgium" data-language="German">Belgium (German)</option>
        <option value="fr-BE" data-country="Belgium" data-language="French">Belgium (French)</option>
        <option value="nl-BE" data-country="Belgium" data-language="Dutch">Belgium (Dutch)</option>
        <option value="bg-BG" data-country="Bulgaria" data-language="Bulgarian">Bulgaria (Bulgarian)</option>
        <option value="be-BY" data-country="Belarus" data-language="Belarusian">Belarus (Belarusian)</option>
        <option value="ru-BY" data-country="Belarus" data-language="Russian">Belarus (Russian)</option>
        <option value="fr-CH" data-country="Switzerland" data-language="French">Switzerland (French)</option>
        <option value="el-CY" data-country="Cyprus" data-language="Greek">Cyprus (Greek)</option>
        <option value="tr-CY" data-country="TRNC" data-language="Turkish">TRNC (Turkish)</option>
        <option value="cs-CZ" data-country="Czechia" data-language="Czech">Czechia (Czech)</option>
        <option value="de-DE" data-country="Germany" data-language="German">Germany (German)</option>
        <option value="da-DK" data-country="Denmark" data-language="Danish">Denmark (Danish)</option>
        <option value="et-EE" data-country="Estonia" data-language="Estonian">Estonia (Estonian)</option>
        <option value="es-ES" data-country="Spain" data-language="Spanish">Spain (Spanish)</option>
        <option value="fi-FI" data-country="Finland" data-language="Finnish">Finland (Finnish)</option>
        <option value="fr-FR" data-country="France" data-language="French">France (French)</option>
        <option value="en-GB" selected data-country="United Kingdom" data-language="English">United Kingdom (English)</option>
        <option value="ka-GE" data-country="Georgia" data-language="Georgian">Georgia (Georgian)</option>
        <option value="el-GR" data-country="Greece" data-language="Greek">Greece (Greek)</option>
        <option value="hr-HR" data-country="Croatia" data-language="Croatian">Croatia (Croatian)</option>
        <option value="hu-HU" data-country="Hungary" data-language="Hungarian">Hungary (Hungarian)</option>
        <option value="en-IE" data-country="Ireland" data-language="English">Ireland (English)</option>
        <option value="is-IS" data-country="Iceland" data-language="Icelandic">Iceland (Icelandic)</option>
        <option value="it-IT" data-country="Italy" data-language="Italian">Italy (Italian)</option>
        <option value="lt-LT" data-country="Lithuania" data-language="Lithuanian">Lithuania (Lithuanian)</option>
        <option value="lv-LV" data-country="Latvia" data-language="Latvian">Latvia (Latvian)</option>

        <option value="en-MT" data-country="Malta" data-language="English">Malta (English)</option>

        <option value="nl-NL" data-country="Netherlands" data-language="Dutch">Netherlands (Dutch)</option>
        <option value="nb-NO" data-country="Norway" data-language="Norwegian Bokmål">Norway (Norwegian)</option>
        <option value="pl-PL" data-country="Poland" data-language="Polish">Poland (Polish)</option>
        <option value="pt-PT" data-country="Portugal" data-language="Portuguese">Portugal (Portuguese)</option>
        <option value="ro-RO" data-country="Romania" data-language="Romanian">Romania (Romanian)</option>
        <option value="sr-RS" data-country="Serbia" data-language="Serbian">Serbia (Serbian)</option>
        <option value="ru-RU" data-country="Russia" data-language="Russian">Russia (Russian)</option>
        <option value="sv-SE" data-country="Sweden" data-language="Swedish">Sweden (Swedish)</option>
        <option value="sl-SI" data-country="Slovenia" data-language="Slovene">Slovenia (Slovene)</option>
        <option value="sk-SK" data-country="Slovakia" data-language="Slovak">Slovakia (Slovak)</option>
        <option value="tr-TR" data-country="Türkiye" data-language="Turkish">Türkiye (Turkish)</option>
        <option value="uk-UA" data-country="Ukraine" data-language="Ukrainian">Ukraine (Ukrainian)</option>
      </select>
      <div class="gallery-grid" id="gallery"></div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@yohns/yoselect@0.1.2/yoSelect.js"></script>
    <script>
      const TEMPLATES = [
        {
          id: 'cover',
          template: 'cover',
          background: './assets/cover.png',
        },
        {
          id: 'quote_1',
          template: 'quote',
          background: './assets/quote_1.png',
        },
        {
          id: 'quote_2',
          template: 'quote',
          background: './assets/quote_2.png',
        },
        {
          id: 'quote_3',
          template: 'quote',
          background: './assets/quote_3.png',
        },
      ];

      const makeCountryQuoteTemplate = ({ id, overlay }) => ({
        id,
        template: 'concerns',
        background: './assets/concerns.png',
        overlay,
      })

      const gallery = document.getElementById('gallery');
      const langSelect = document.getElementById('lang-select');

      const cache = {};

      async function loadPack(locale) {
        if (!cache[locale]) {
          const res = await fetch(`./data/lang/${locale}.json`);
          cache[locale] = await res.json();
        }

        return cache[locale];
      }

      function buildUrl(template, translation) {
        const serialized = {};
        for (const [key, val] of Object.entries(translation)) {
          const parts = val.split(/<strong>([^<]*)<\/strong>/);
          if (parts.length === 1) {
            serialized[key] = val;
          } else {
            const ops = [];
            for (let i = 0; i < parts.length; i += 2) {
              ops.push({
                insert: parts[i],
              });

              if (i + 1 < parts.length) {
                ops.push({
                  insert: parts[i + 1],
                  attributes: { bold: true },
                });
              }
            }

            serialized[key] = JSON.stringify(ops);
          }
        }

        const params = new URLSearchParams(serialized);
        return `./${template}?${params.toString()}`;
      }

      function makeLink(template, translation) {
        const a = document.createElement('a');
        a.className = 'template-card';
        a.href = buildUrl(template.template, translation);
        a.innerHTML = `
          <img src="${template.background}" alt="" />
          ${template.overlay ? `<div class="overlay">${template.overlay}</div>` : ''}
          <div class="overlay-hover"><span>View and edit</span></div>
        `;
        return a;
      }

      async function render(translationsLoader) {
        gallery.innerHTML = '';

        const translations = await translationsLoader();
        const resolveTranslation = (t) => {
          const { $parent, ...rest } = t ?? {};
          const parentData = $parent ? resolveTranslation(translations[$parent]) : {}
          return { ...parentData, ...rest }
        }

        for (const template of TEMPLATES) {
          const translation = resolveTranslation(translations[template.id]);
          if (!translation) continue;
          gallery.appendChild(makeLink(template, translation));
        }

        for (const [idx, concern] of Object.entries(translations.concerns ?? [])) {
          const translation = resolveTranslation(concern);
          let overlay = translation.body.length > 100 ? `${translation.body.slice(0, 97)}&hellip;` : translation.body;
          const template = makeCountryQuoteTemplate({ id: `concern_${idx}`, overlay });
          gallery.appendChild(makeLink(template, translation));
        }
      }

      new YoSelect(langSelect, {
        search: true,
        searchPlaceholder: 'Search country…',
      });

      langSelect.addEventListener('change', async (e) => {
        render(() => loadPack(e.target.value));
      });

      render(() => loadPack('en-UK'));
    </script>
  </body>
</html>
